      ep: VitisAIExecutionProvider
      aitk:
        oliveFile: "VitisAI/Phi-3-mini-4k-instruct_quark_vitisai_llm.json"
        requirements: AMD/Quark_py3.10.17
        evalRuntime: AMDNPU
