keywords:
    aitk
arch: mistral
recipes:
    - file: "Mistral_7B_Instruct_v0.2_gpu_context_ov_dy.json"
      devices:
        - gpu
        - cpu
      ep: OpenVINOExecutionProvider
    - file: "Mistral_7B_Instruct_v0.2_npu_context_ov_dy.json"
      device: npu
      ep: OpenVINOExecutionProvider
    - file: "Mistral_7B_Instruct_v0.2_trtrtx.json"
      device: gpu
      ep: NvTensorRTRTXExecutionProvider
      aitk:
          oliveFile: "NvTensorRtRtx/Mistral-7B-Instruct-v0.2_model_builder_int4.json"
    - file: "Mistral_7B_Instruct_v0.2_vitis_ai_config.json"
      device: npu
      ep: VitisAIExecutionProvider
      aitk:
        oliveFile: "VitisAI/Mistral-7B-Instruct-v0.2_quark_vitisai_llm.json"
        requirements: AMD/Quark_py3.10.17
        evalRuntime: AMDNPU
    - file: "Mistral_7B_Instruct_v0.2_migraphx_config.json"
      device: gpu
      ep: MIGraphXExecutionProvider
aitk:
    modelInfo:
        id: "huggingface/mistralai/Mistral-7B-Instruct-v0.2"
        version: 2
