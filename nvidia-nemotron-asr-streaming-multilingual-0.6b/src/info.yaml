name: nvidia-nemotron-asr-streaming-multilingual-0.6b
provider: NVIDIA
model_id: nvidia/NVIDIA-Nemotron-3.5-ASR-Streaming-Multilingual-0.6b
task: automatic-speech-recognition
framework: ONNX Runtime
execution_provider:
  - CPUExecutionProvider
  - CUDAExecutionProvider
summary: >
  Recipe for exporting the multilingual NVIDIA Nemotron 3.5 ASR Streaming RNNT model
  (0.6B params, 100+ languages) to ONNX and optimizing encoder weights to INT4
  (k_quant) for low-memory CPU/CUDA inference.

artifacts:
  - src/nemotron_encoder_int4_cpu.json
  - src/nemotron_encoder_int8_cpu.json
  - src/nemotron_decoder_fp32_cpu.json
  - src/nemotron_joint_fp32_cpu.json
  - src/optimize.py

scripts:
  - scripts/export_tokenizer.py
