keywords:
    aitk
arch: phi3
recipes:
    - file: "phi3_ov_config.json"
      devices:
        - gpu
        - cpu
      ep: OpenVINOExecutionProvider
    - file: "phi3_trtrtx.json"
      device: gpu
      ep: NvTensorRTRTXExecutionProvider
      aitk:
          oliveFile: "NvTensorRtRtx/Phi-3-mini-128k-instruct_nvmo_int4_rtn.json"
    - file: "phi3_qnn.json"
      device: npu
      ep: QNNExecutionProvider
      aitk:
        oliveFile: "QNN/config.json"
    - file: "phi3_vitis_ai_config.json"
      device: npu
      ep: VitisAIExecutionProvider
      aitk:
        oliveFile: "VitisAI/Phi-3-mini-128k-instruct_quark_vitisai_llm.json"
        requirements: AMD/Quark_py3.10.17
        evalRuntime: AMDNPU
aitk:
    modelInfo:
        id: "huggingface/microsoft/Phi-3-mini-128k-instruct"
        version: 3
        groupId: "huggingface/microsoft/Phi-3-mini-4k-instruct"
        groupItemName: "128K"
