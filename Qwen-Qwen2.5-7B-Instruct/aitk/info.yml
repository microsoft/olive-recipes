keywords:
    aitk
arch: qwen2
recipes:
    - file: "qwen2_5_ov_config.json"
      devices:
        - gpu
        - cpu
      ep: OpenVINOExecutionProvider
    - file: "qwen2_5_ov_npu_config.json"
      devices:
        - npu
      ep: OpenVINOExecutionProvider
    - file: "qwen2_5_trtrtx.json"
      device: gpu
      ep: NvTensorRTRTXExecutionProvider
      aitk:
          oliveFile: "NvTensorRtRtx/Qwen2.5-7B-Instruct_model_builder_int4.json"
    - file: "qwen2_5_qnn_config.json"
      device: npu
      ep: QNNExecutionProvider
      aitk:
        oliveFile: "QNN/config.json"
    - file: "qwen2_5_vitis_ai_config.json"
      device: npu
      ep: VitisAIExecutionProvider
      aitk:
        oliveFile: "VitisAI/Qwen2.5-7B-Instruct_quark_vitisai_llm.json"
        requirements: AMD/Quark_py3.10.17
        evalRuntime: AMDNPU
    - file: "qwen2_5_migraphx_config.json"
      device: gpu
      ep: MIGraphXExecutionProvider
aitk:
    modelInfo:
        id: "huggingface/Qwen/Qwen2.5-7B-Instruct"
        version: 3
        groupId: "huggingface/Qwen/Qwen2.5-1.5B-Instruct"
        groupItemName: "7B"
